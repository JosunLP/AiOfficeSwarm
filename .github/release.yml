changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🧩 Plugins & Runtime
      labels:
        - plugin
        - runtime
    - title: 🔐 Policy & Security
      labels:
        - security
        - policy
    - title: 🛠 Maintenance
      labels:
        - chore
        - dependencies
        - documentation
    - title: Other Changes
      labels:
        - '*'
