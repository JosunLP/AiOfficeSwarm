name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish (for example: v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: swarm
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: swarm
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: swarm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: swarm.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p swarm-cli --bin swarm --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -rf package dist
          mkdir -p package dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          cp README.md LICENSE.md package/
          tar -czf "dist/swarm-${{ matrix.target }}.tar.gz" -C package .

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path package) { Remove-Item package -Recurse -Force }
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          New-Item -ItemType Directory -Force -Path package | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
          Copy-Item README.md package/README.md
          Copy-Item LICENSE.md package/LICENSE.md
          Compress-Archive -Path "package/*" -DestinationPath "dist/swarm-${{ matrix.target }}.zip" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: swarm-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: swarm-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum swarm-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ inputs.release_tag || github.ref_name }}
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          target_commitish: ${{ inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
            scripts/install.sh
            scripts/uninstall.sh
            scripts/install.ps1
            scripts/uninstall.ps1
